name: Prom Feed Sync

on:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  workflow_dispatch:      # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium bs4 lxml requests webdriver-manager

    - name: Run Feed Generator
      run: python github_action/buktex_xml.py

    - name: Commit and Push generated feed
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add github_action/feed.xml
        git commit -m "Auto-update feed.xml [skip ci]" || echo "No changes to commit"
        git push
